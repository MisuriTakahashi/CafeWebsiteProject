<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Tsambayan Milktea</title>
    <link rel="icon" type="image/png" href="TempPictures/logo.jpg">
    <link rel="stylesheet" href="Loginstyle.css">
</head>
<body>
    <div class="register-container">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
                <div class="error-message" id="userError">Username already exists</div>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                <div class="error-message" id="passError">Passwords do not match</div>
            </div>
            <button type="submit">Create Account</button>
            <div class="form-footer">
            <a href="Login.html">Login</a>
            </div>
            <center><a href="index.html" class="back-link">Return to Home</a></center>
        </form>
    </div>
    <script src="Register.js"></script>
</body>
</html>
